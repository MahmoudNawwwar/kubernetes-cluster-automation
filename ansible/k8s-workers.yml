---
- name: Prepare kuberntes Workers
  hosts: k8s_workers
  become: true

  tasks:
    - name: disable swab
      command: swapoff -a

    - name: disable swap permanently
      replace:
        path: /etc/fstab
        regexp: '^(.*swap.*)$'
        replace: '# \1'
      changed_when: false
    - name: check containerd version
      command: containerd --version
      register: containerd_version
      changed_when: false
    - name: showing the version of container
      debug:
        var: containerd_version.stdout

    - name: Enable and start containerd
      service:
        name: containerd
        state: started
        enabled: true
      changed_when: false

    - name: showing the status of the service
      command: systemctl is-enabled containerd
      register: containerd_status
      changed_when: false

    - name: show the result
      debug:
        var: containerd_status.stdout

    - name: install prerequests
      apt:
        name:
          -  apt-transport-https
          - ca-certificates
          - curl
          - gpg
        state: present
        update_cache: yes

    - name: Add Kubernetes GPG key
      shell: |
        curl -fsSL https://pkgs.k8s.io/core:/stable:/v1.34/deb/Release.key | \
        gpg --dearmor -o /etc/apt/keyrings/kubernetes-apt-keyring.gpg
      args:
        creates: /etc/apt/keyrings/kubernetes-apt-keyring.gpg


    - name: Add Kubernetes repository
      apt_repository:
        repo: "deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.gpg] https://pkgs.k8s.io/core:/stable:/v1.34/deb/ /"
        filename: kubernetes
        state: present
        
    - name: install kubernetes packages
      apt:
         name:
           - kubelet
           - kubeadm
         state: present

    - name: Hold Kubernetes packages
      dpkg_selections:
        name: "{{ item }}"
        selection: hold
      loop:
        - kubelet
        - kubeadm

    - name: join workers to kubernetes cluster
      command: >
        kubeadm join 192.168.137.128:6443
           --token ym4hy9.gpjqhz0qk9ynhdfv
           --discovery-token-ca-cert-hash sha256:76c5f95eab340c342745d0d1eb6e25f2aae69f99909869fda9870daa09a00804
      args:
        creates: /etc/kubernetes/kubelet.conf













